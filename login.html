<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>تسجيل الدخول | دوائي</title><style>body{margin:0;background:#f5f7fa;color:#243746;font-family:'Segoe UI',Tahoma,sans-serif}.page{max-width:460px;margin:55px auto;padding:0 20px}.panel{background:#fff;padding:34px;border-radius:8px;box-shadow:0 12px 30px #00000012}h1{color:#0d3b66}p{color:#667085}label{display:block;margin:18px 0 7px;font-weight:600}input{width:100%;padding:13px;border:1px solid #d0d5dd;border-radius:7px;font:inherit}button{width:100%;margin-top:25px;padding:14px;border:0;border-radius:7px;background:#009688;color:#fff;font:inherit;font-weight:bold;cursor:pointer}.message{display:none;margin-top:18px;padding:12px;border-radius:7px;background:#e7f6f3;color:#08665c}</style></head><body><div id="header"></div><main class="page"><section class="panel"><h1>تسجيل الدخول</h1><p>أدخل بريدك الإلكتروني للمتابعة إلى حسابك.</p><form id="login-form"><label for="email">البريد الإلكتروني</label><input id="email" type="email" required placeholder="name@example.com"><label for="password">كلمة المرور</label><input id="password" type="password" required minlength="4" placeholder="••••••••"><button type="submit">دخول</button></form><div id="message" class="message"></div></section></main><script src="app.js"></script><script>Dawaei.loadHeader();document.getElementById('login-form').onsubmit=e=>{e.preventDefault();localStorage.setItem('dawaeiUser',email.value);message.textContent=`مرحبًا ${email.value}، تم تسجيل الدخول بنجاح.`;message.style.display='block';e.currentTarget.reset();};</script></body></html>
