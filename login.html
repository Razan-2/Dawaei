<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>تسجيل الدخول | دوائي</title><style>body{margin:0;background:#f5f7fa;color:#243746;font-family:'Segoe UI',Tahoma,sans-serif}.page{max-width:460px;margin:0 auto;padding:24px 20px}.panel{background:#fff;padding:34px;border-radius:8px;box-shadow:0 12px 30px #00000012}h1{color:#0d3b66}p{color:#667085}label{display:block;margin:18px 0 7px;font-weight:600}input{box-sizing:border-box;width:100%;padding:13px;border:1px solid #d0d5dd;border-radius:7px;font:inherit}.password-field{position:relative}.password-field input{padding-left:82px}.password-toggle{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:auto;margin:0;padding:6px 9px;border:0;border-radius:5px;background:#e7f6f3;color:#08665c;font:inherit;font-size:13px;font-weight:600;cursor:pointer}button{width:100%;margin-top:25px;padding:14px;border:0;border-radius:7px;background:#009688;color:#fff;font:inherit;font-weight:bold;cursor:pointer}.message{display:none;margin-top:18px;padding:12px;border-radius:7px;background:#e7f6f3;color:#08665c}</style></head><body><div id="header"></div><main class="page"><section class="panel"><h1>تسجيل الدخول</h1><p>أدخل بريدك الإلكتروني للمتابعة إلى حسابك.</p><form id="login-form"><label for="email">البريد الإلكتروني</label><input id="email" type="email" required placeholder="name@example.com"><label for="password">كلمة المرور</label><div class="password-field"><input id="password" type="password" required minlength="4" placeholder="••••••••"><button id="password-toggle" class="password-toggle" type="button" aria-label="إظهار كلمة المرور" aria-pressed="false">إظهار</button></div><button type="submit">دخول</button></form><div id="message" class="message"></div></section></main><script src="app.js"></script><script>
Dawaei.loadHeader();

const loginForm = document.getElementById('login-form');
const passwordInput = document.getElementById('password');
const passwordToggle = document.getElementById('password-toggle');

passwordToggle.addEventListener('click', () => {
  const isHidden = passwordInput.type === 'password';
  passwordInput.type = isHidden ? 'text' : 'password';
  passwordToggle.textContent = isHidden ? 'إخفاء' : 'إظهار';
  passwordToggle.setAttribute('aria-label', isHidden ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
  passwordToggle.setAttribute('aria-pressed', String(isHidden));
});

loginForm.addEventListener('submit', event => {
  event.preventDefault();
  if (!loginForm.reportValidity()) return;

  const email = document.getElementById('email').value.trim();
  localStorage.setItem('dawaeiUser', email);
  window.location.replace('index.html');
});
</script></body></html>
