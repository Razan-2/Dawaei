<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Header - دوائي</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
    background:#f7f7f7;
}

header{
    width:100%;
    background:#fff;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:999;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:15px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:#0d3b66;
}

.logo img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

.logo h1{
    font-size:24px;
    margin-bottom:3px;
}

.logo span{
    font-size:13px;
    color:#777;
}

nav ul{
    display:flex;
    list-style:none;
    gap:28px;
}

nav ul li a{
    text-decoration:none;
    color:#333;
    font-weight:600;
    transition:.3s;
}

nav ul li a:hover{
    color:#009688;
}

.login-btn{
    background:#009688;
    color:#fff;
    border:none;
    padding:11px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

.login-btn:hover{
    background:#00796b;
}

.menu-btn{
    display:none;
    font-size:30px;
    cursor:pointer;
    user-select:none;
}

/* الجوال */

@media(max-width:900px){

.container{
    flex-wrap:wrap;
}

.menu-btn{
    display:block;
}

nav{
    width:100%;
    display:none;
    margin-top:15px;
}

nav.active{
    display:block;
}

nav ul{
    flex-direction:column;
    gap:0;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

nav ul li{
    border-bottom:1px solid #eee;
}

nav ul li:last-child{
    border-bottom:none;
}

nav ul li a{
    display:block;
    padding:16px;
}

.login-btn{
    width:100%;
    margin-top:15px;
}

}
</style>

</head>

<body>

<header>

<div class="container">

<a href="index.html" class="logo">

<img src="media/logo.jpeg" alt="شعار دوائي">

<div>
<h1>دوائي</h1>
<span>منبه مواعيد الأدوية</span>
</div>

</a>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

<nav id="menu">

<ul>

<li><a href="index.html">الرئيسية</a></li>

<li><a href="add-medicine.html">إضافة دواء</a></li>

<li><a href="appointments.html">مواعيدي</a></li>

<li><a href="reminders.html">التذكيرات</a></li>

<li><a href="contact.html">اتصل بنا</a></li>

</ul>

</nav>

<button class="login-btn">
تسجيل الدخول
</button>

</div>

</header>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
