<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>مواعيدي | دوائي</title><style>body{margin:0;background:#f5f7fa;color:#243746;font-family:'Segoe UI',Tahoma,sans-serif}.page{max-width:900px;margin:55px auto;padding:0 20px}h1{color:#0d3b66}.list{display:grid;gap:14px}.item{display:flex;align-items:center;justify-content:space-between;gap:20px;background:#fff;border-radius:8px;padding:20px;box-shadow:0 5px 16px #0000000d}.item h2{font-size:19px;margin:0 0 7px;color:#0d3b66}.item p{margin:0;color:#667085}.time{font-weight:bold;color:#009688;font-size:20px}.delete{border:0;background:#fff1f0;color:#b42318;border-radius:6px;padding:9px 12px;cursor:pointer}.empty{background:#fff;padding:30px;text-align:center;border-radius:8px;color:#667085}@media(max-width:560px){.item{align-items:flex-start;flex-wrap:wrap}.time{margin-left:auto}}</style></head><body><div id="header"></div><main class="page"><h1>مواعيدي</h1><div class="list" id="list"></div></main><script src="app.js"></script><script>Dawaei.loadHeader();function render(){const meds=Dawaei.get('medicines'),list=document.getElementById('list');list.innerHTML=meds.length?meds.map(m=>`<article class="item"><div><h2>${m.name}</h2><p>${m.dose} · ${m.frequency}</p></div><div class="time">${m.time}</div><button class="delete" data-id="${m.id}">حذف</button></article>`).join(''):'<div class="empty">لا توجد أدوية مسجلة حاليًا. أضف دواءً لتظهر مواعيده هنا.</div>';list.querySelectorAll('.delete').forEach(b=>b.onclick=()=>{Dawaei.set('medicines',Dawaei.get('medicines').filter(m=>m.id!==b.dataset.id));render();});}render();</script></body></html>
