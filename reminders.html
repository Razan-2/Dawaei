<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>التذكيرات | دوائي</title><style>body{margin:0;background:#f5f7fa;color:#243746;font-family:'Segoe UI',Tahoma,sans-serif}.page{max-width:900px;margin:55px auto;padding:0 20px}h1{color:#0d3b66}.list{display:grid;gap:14px}.item{background:#fff;border-radius:8px;padding:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 5px 16px #0000000d}.item h2{font-size:19px;margin:0 0 6px;color:#0d3b66}.item p{margin:0;color:#667085}.toggle{appearance:none;width:48px;height:26px;background:#cbd5e1;border-radius:20px;position:relative;cursor:pointer}.toggle:after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;right:3px;transition:.2s}.toggle:checked{background:#009688}.toggle:checked:after{right:25px}.empty{background:#fff;padding:30px;text-align:center;border-radius:8px;color:#667085}</style></head><body><div id="header"></div><main class="page"><h1>التذكيرات</h1><div class="list" id="list"></div></main><script src="app.js"></script><script>Dawaei.loadHeader();function render(){const meds=Dawaei.get('medicines'),list=document.getElementById('list');list.innerHTML=meds.length?meds.map(m=>`<article class="item"><div><h2>${m.name}</h2><p>تذكير ${m.frequency} عند ${m.time}</p></div><input class="toggle" type="checkbox" data-id="${m.id}" ${m.enabled!==false?'checked':''} aria-label="تفعيل تذكير ${m.name}"></article>`).join(''):'<div class="empty">لا توجد تذكيرات بعد. أضف دواءً أولًا.</div>';list.querySelectorAll('.toggle').forEach(t=>t.onchange=()=>{const meds=Dawaei.get('medicines');meds.find(m=>m.id===t.dataset.id).enabled=t.checked;Dawaei.set('medicines',meds);});}render();</script></body></html>
