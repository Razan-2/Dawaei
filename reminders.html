<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>التذكيرات | دوائي</title>
  <script>try{if(!localStorage.getItem('dawaeiUser'))location.replace('login.html')}catch(error){location.replace('login.html')}</script>
  <style>
    body{margin:0;background:#f5f7fa;color:#243746;font-family:'Segoe UI',Tahoma,sans-serif}.page{max-width:900px;margin:55px auto;padding:0 20px}h1{color:#0d3b66}.alarm-panel{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:18px;padding:17px 20px;background:#e7f6f3;border-radius:8px;color:#08665c}.alarm-panel p{margin:4px 0 0}.alarm-actions{display:flex;gap:8px;flex-wrap:wrap}.alarm-button{border:0;border-radius:7px;padding:11px 16px;background:#009688;color:#fff;font:inherit;font-weight:bold;cursor:pointer;white-space:nowrap}.list{display:grid;gap:14px}.item{background:#fff;border-radius:8px;padding:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 5px 16px #0000000d}.item h2{font-size:19px;margin:0 0 6px;color:#0d3b66}.item p{margin:0;color:#667085}.toggle{appearance:none;width:48px;height:26px;background:#cbd5e1;border-radius:20px;position:relative;cursor:pointer}.toggle:after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;right:3px;transition:.2s}.toggle:checked{background:#009688}.toggle:checked:after{right:25px}.empty{background:#fff;padding:30px;text-align:center;border-radius:8px;color:#667085}@media(max-width:560px){.alarm-panel{align-items:flex-start;flex-direction:column}.item{gap:15px}}
  </style>
</head>
<body>
  <div id="header"></div>
  <main class="page">
    <h1>التذكيرات</h1>
    <section class="alarm-panel" aria-labelledby="alarm-heading">
      <div><strong id="alarm-heading">تنبيه بصوت المنبّه</strong><p id="alarm-status">فعّل التنبيه ليصدر صوت عند حلول موعد الدواء.</p></div>
      <div class="alarm-actions"><button id="enable-alarm" class="alarm-button" type="button">تفعيل التنبيه الصوتي</button></div>
    </section>
    <div class="list" id="list"></div>
  </main>
  <script src="app.js"></script>
  <script>
    Dawaei.loadHeader();
    const list = document.getElementById('list');
    const alarmButton = document.getElementById('enable-alarm');
    const alarmStatus = document.getElementById('alarm-status');

    function formatTime(time) {
      const [hourText, minute] = time.split(':');
      const hour = Number(hourText);
      const period = hour >= 12 ? 'م' : 'ص';
      return `${hour % 12 || 12}:${minute} ${period}`;
    }

    function showAlarmStatus() {
      const enabled = localStorage.getItem('dawaeiAlarmsEnabled') === 'true';
      alarmButton.textContent = enabled ? 'إيقاف التنبيه الصوتي' : 'تفعيل التنبيه الصوتي';
      alarmStatus.textContent = enabled ? 'التنبيه الصوتي مفعّل. اضغط الزر لإيقافه.' : 'التنبيه الصوتي متوقف. اضغط الزر لتفعيله.';
    }

    alarmButton.addEventListener('click', async () => {
      try {
        if (localStorage.getItem('dawaeiAlarmsEnabled') === 'true') {
          await Dawaei.disableAlarms();
        } else {
          await Dawaei.enableAlarms();
        }
        showAlarmStatus();
      } catch (error) {
        alarmStatus.textContent = 'تعذر تفعيل الصوت. تحقق من أذونات المتصفح ثم حاول مجددًا.';
      }
    });

    function render() {
      const medicines = Dawaei.get('medicines');
      list.innerHTML = medicines.length ? medicines.map(medicine => `<article class="item"><div><h2>${medicine.name}</h2><p>تذكير ${medicine.frequency} عند ${formatTime(medicine.time)}</p></div><input class="toggle" type="checkbox" data-id="${medicine.id}" ${medicine.enabled !== false ? 'checked' : ''} aria-label="تفعيل تذكير ${medicine.name}"></article>`).join('') : '<div class="empty">لا توجد تذكيرات بعد. أضف دواءً أولًا.</div>';
      list.querySelectorAll('.toggle').forEach(toggle => toggle.addEventListener('change', () => {
        const medicines = Dawaei.get('medicines');
        const medicine = medicines.find(item => item.id === toggle.dataset.id);
        if (medicine) medicine.enabled = toggle.checked;
        Dawaei.set('medicines', medicines);
      }));
    }

    showAlarmStatus();
    render();
  </script>
</body>
</html>
