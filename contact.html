<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تواصل مع دكتورك الخاص | دوائي</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
    background:#f5f7fa;
    min-height:100vh;
}

/* مكان ظهور الهيدر */
#header-container{
    width:100%;
}

/* إضافة مسافة بعد الهيدر */
.page-content{
    padding-top:60px;
}

.container{
    max-width:700px;
    margin:0 auto 60px;
    background:#fff;
    padding:40px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#0d3b66;
    font-size:38px;
    margin-bottom:15px;
}

p{
    text-align:center;
    color:#666;
    font-size:17px;
    line-height:1.8;
    margin-bottom:35px;
}

input,
textarea{
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#009688;
    box-shadow:0 0 10px rgba(0,150,136,.15);
}

textarea{
    height:180px;
    resize:none;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#009688;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00796b;
}

button:disabled{
    cursor:wait;
    opacity:.7;
}

.send-status{
    display:none;
    margin-top:18px;
    padding:13px;
    border-radius:10px;
    background:#e7f6f3;
    color:#08665c;
    text-align:center;
}

.send-status.error{
    background:#fff1f0;
    color:#b42318;
}

@media(max-width:768px){

.page-content{
    padding-top:25px;
}

.container{
    width:92%;
    padding:25px;
    margin:0 auto 40px;
}

h1{
    font-size:30px;
}

}

</style>

</head>

<body>

<!-- الهيدر -->
<div id="header-container"></div>

<!-- محتوى الصفحة -->
<div class="page-content">

<div class="container">

<h1>تواصل مع دكتورك الخاص</h1>

<p>
أرسل استفسارك إلى دكتورك الخاص، وستصل الرسالة مباشرةً إلى البريد الإلكتروني.
</p>

<form id="doctor-contact-form" action="https://formsubmit.co/ajax/razanalqobti@gmail.com" method="POST">

<input type="hidden" name="_subject" value="استفسار جديد عبر موقع دوائي">
<input type="hidden" name="_template" value="table">

<input
id="sender-name"
name="name"
type="text"
placeholder="الاسم الكامل"
required>

<input
id="sender-email"
name="email"
type="email"
placeholder="البريد الإلكتروني"
required>

<textarea
id="sender-message"
name="message"
placeholder="اكتب رسالتك هنا..."
required></textarea>

<button id="send-button" type="submit">
إرسال
</button>

</form>
<div id="send-status" class="send-status" role="status" aria-live="polite"></div>

</div>

</div>

<script src="app.js"></script>
<script>
Dawaei.loadHeader('header-container');
const contactForm = document.getElementById('doctor-contact-form');
const sendButton = document.getElementById('send-button');
const sendStatus = document.getElementById('send-status');

contactForm.addEventListener('submit', async event => {
    event.preventDefault();
    if (!contactForm.reportValidity()) return;

    sendButton.disabled = true;
    try {
        const response = await fetch(contactForm.action, {
            method: 'POST',
            body: new FormData(contactForm),
            headers: { Accept: 'application/json' }
        });
        if (!response.ok) throw new Error('تعذر إرسال الرسالة');

        contactForm.reset();
        sendStatus.textContent = 'شكرًا لتواصلك معنا. سوف يتم الرد عليك في أقرب وقت ممكن.';
        sendStatus.classList.remove('error');
    } catch (error) {
        sendStatus.textContent = 'تعذر إرسال الاستفسار حاليًا. يرجى المحاولة مرة أخرى.';
        sendStatus.classList.add('error');
    } finally {
        sendStatus.style.display = 'block';
        sendButton.disabled = false;
    }
});
</script>

</body>

</html>
