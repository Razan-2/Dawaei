<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>اتصل بنا | دوائي</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
    background:#f5f7fa;
}

.container{
    max-width:700px;
    margin:60px auto;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h1{
    color:#0d3b66;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:25px;
}

input,
textarea{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

textarea{
    height:170px;
    resize:none;
}

button{
    width:100%;
    padding:15px;
    background:#009688;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#00796b;
}
</style>

</head>

<body>

<div class="container">

<h1>اتصل بنا</h1>

<p>يسعدنا استقبال استفساراتكم وملاحظاتكم.</p>

<form>

<input type="text" placeholder="الاسم الكامل" required>

<input type="email" placeholder="البريد الإلكتروني" required>

<textarea placeholder="اكتب رسالتك..." required></textarea>

<button type="submit">
إرسال
</button>

</form>

</div>

</body>
</html>
